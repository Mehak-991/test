<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Premium Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="contact-container">
        <section class="contact-card">
            <header class="contact-header">
                <h1>Contact Us</h1>
                <p>Have a question or feedback? We'd love to hear from you.</p>
            </header>

            <form id="contactForm" class="contact-form">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="hello@example.com" required>
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="submit-button">
                    <span class="btn-text">Send</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="statusMessage" class="status-message"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
